<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>隔空对唱</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { 
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    color: #fff; min-height: 100vh; min-height: 100dvh;
    display: flex; align-items: center; justify-content: center;
    -webkit-user-select: none; user-select: none;
}
.container { text-align: center; padding: 30px 20px; max-width: 500px; width: 100%; }
h1 { font-size: 26px; margin-bottom: 8px; letter-spacing: 4px; }
.sub { color: #aaa; margin-bottom: 30px; font-size: 14px; }

.btn {
    width: 130px; height: 130px; border-radius: 50%;
    border: 4px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.05);
    color: #fff; font-size: 17px; cursor: pointer; transition: all 0.3s;
    display: inline-flex; align-items: center; justify-content: center;
    position: relative; outline: none; margin: 0 auto;
    -webkit-tap-highlight-color: transparent;
}
.btn:hover { border-color: #ff6b6b; box-shadow: 0 0 30px rgba(255,107,107,0.3); }
.btn.recording { 
    border-color: #ff6b6b; background: rgba(255,107,107,0.15);
    animation: pulse 1.5s ease-in-out infinite;
    box-shadow: 0 0 40px rgba(255,107,107,0.5);
}
@keyframes pulse {
    0%,100% { transform: scale(1); box-shadow: 0 0 30px rgba(255,107,107,0.3); }
    50% { transform: scale(1.08); box-shadow: 0 0 60px rgba(255,107,107,0.6); }
}
.btn.done { border-color: #4ecdc4; animation: none; }
.btn.loading { border-color: #ffd700; }

.status { margin-top: 25px; font-size: 15px; color: #aaa; min-height: 22px; }
.timer { font-size: 34px; font-weight: 300; margin-top: 8px; font-variant-numeric: tabular-nums; }
.info { color: #666; font-size: 12px; margin-top: 4px; min-height: 16px; }

/* 加载进度条 */
.load-progress-wrap { margin: 25px auto 0; width: 80%; max-width: 300px; display: none; }
.load-progress-wrap.show { display: block; }
.load-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
.load-bar-fill { height: 100%; background: #ffd700; width: 0%; transition: width 0.3s; border-radius: 3px; }
.load-text { font-size: 12px; color: #888; margin-top: 6px; }

.progress { margin-top: 20px; height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
.progress-bar { height: 100%; background: #ff6b6b; width: 0%; transition: width 0.3s; }

.volume-row { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 18px; }
.volume-row label { font-size: 13px; color: #888; min-width: 50px; text-align: right; }
.volume-row input[type=range] { width: 110px; accent-color: #ff6b6b; }
.volume-row span { font-size: 12px; color: #666; min-width: 30px; }

.note { color: #555; font-size: 12px; margin-top: 25px; line-height: 1.8; }
.retry-link { color: #ff6b6b; cursor: pointer; text-decoration: underline; font-size: 13px; margin-top: 10px; display: none; }
</style>
</head>
<body>
<div class="container">
    <h1>隔空对唱</h1>
    <p class="sub">录制 + 混音 · 一键完成</p>
    
    <button class="btn loading" id="recordBtn" onclick="toggleRecord()" disabled>加载<br>伴奏</button>
    
    <div class="timer" id="timer">00:00</div>
    <div class="info" id="info"></div>
    <div class="load-progress-wrap show" id="loadWrap">
        <div class="load-bar"><div class="load-bar-fill" id="loadBar"></div></div>
        <div class="load-text" id="loadText">正在下载伴奏 0%</div>
    </div>
    <div class="status" id="status"></div>
    <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
    
    <div class="volume-row">
        <label>人声音量</label>
        <input type="range" id="voiceVol" min="50" max="200" value="100" oninput="updateVolLabel()">
        <span id="voiceVolLabel">100%</span>
    </div>
    
    <p class="note">
        点击按钮 → 伴奏响起 → 开始唱<br>
        唱完自动停止 → 合成 → 下载成品<br>
        建议佩戴耳机
    </p>
    <div class="retry-link" id="retryLink" onclick="loadBacking()">重新加载</div>
</div>

<audio id="previewAudio" style="display:none"></audio>

<script>
const btn = document.getElementById('recordBtn');
const timerEl = document.getElementById('timer');
const statusEl = document.getElementById('status');
const infoEl = document.getElementById('info');
const progressBar = document.getElementById('progressBar');
const voiceVolSlider = document.getElementById('voiceVol');
const voiceVolLabel = document.getElementById('voiceVolLabel');
const loadWrap = document.getElementById('loadWrap');
const loadBar = document.getElementById('loadBar');
const loadText = document.getElementById('loadText');
const retryLink = document.getElementById('retryLink');
const previewAudio = document.getElementById('previewAudio');

let audioCtx = null;
let backingBuffer = null;
let isRecording = false;
let startTime = 0;
let timerInterval = null;
let recorderNode = null;
let backingSource = null;
let recordedChunks = [];

function updateVolLabel() {
    voiceVolLabel.textContent = voiceVolSlider.value + '%';
}

// ---- 加载伴奏（带进度 + 超时 + 重试）----
async function loadBacking() {
    btn.disabled = true;
    btn.className = 'btn loading';
    btn.innerHTML = '加载<br>伴奏';
    loadWrap.classList.add('show');
    loadBar.style.width = '0%';
    loadText.textContent = '正在下载伴奏 0%';
    retryLink.style.display = 'none';
    statusEl.textContent = '';
    infoEl.textContent = '';
    
    const files = ['backing_mix.wav', 'backing.wav', 'backing.mp3'];
    let arrayBuf = null;
    let loadedFile = '';
    
    for (const f of files) {
        try {
            arrayBuf = await downloadWithProgress(f, (pct) => {
                loadBar.style.width = pct + '%';
                loadText.textContent = '下载伴奏 ' + pct + '%';
            });
            if (arrayBuf) { loadedFile = f; break; }
        } catch(e) { continue; }
    }
    
    if (!arrayBuf) {
        loadText.textContent = '伴奏下载失败，请检查网络';
        statusEl.textContent = '下载失败';
        retryLink.style.display = 'block';
        return;
    }
    
    loadText.textContent = '解码音频中...';
    
    try {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 44100 });
        }
        
        // 解码超时保护
        const decodePromise = audioCtx.decodeAudioData(arrayBuf);
        const timeoutPromise = new Promise((_, reject) => 
            setTimeout(() => reject(new Error('decode timeout')), 15000)
        );
        
        backingBuffer = await Promise.race([decodePromise, timeoutPromise]);
        
        btn.disabled = false;
        btn.className = 'btn';
        btn.innerHTML = '开始<br>录制';
        statusEl.textContent = '点击按钮开始';
        infoEl.textContent = '伴奏就绪 · ' + formatTime(backingBuffer.duration);
        loadWrap.classList.remove('show');
        
    } catch(e) {
        console.error('decode error:', e);
        loadText.textContent = '音频解码失败，请刷新重试';
        statusEl.textContent = '解码失败';
        retryLink.style.display = 'block';
    }
}

function downloadWithProgress(url, onProgress) {
    return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open('GET', url);
        xhr.responseType = 'arraybuffer';
        xhr.timeout = 60000;
        
        xhr.onprogress = (e) => {
            if (e.lengthComputable && onProgress) {
                onProgress(Math.round(e.loaded / e.total * 100));
            }
        };
        
        xhr.onload = () => {
            if (xhr.status === 200 || xhr.status === 304) {
                resolve(xhr.response);
            } else {
                reject(new Error('HTTP ' + xhr.status));
            }
        };
        
        xhr.onerror = () => reject(new Error('network error'));
        xhr.ontimeout = () => reject(new Error('timeout'));
        
        xhr.send();
    });
}

loadBacking();

// ---- 录制 ----
async function toggleRecord() {
    if (isRecording) {
        stopRecording();
        return;
    }
    
    if (!backingBuffer || !audioCtx) return;
    
    try {
        statusEl.textContent = '获取麦克风权限...';
        
        const stream = await navigator.mediaDevices.getUserMedia({ 
            audio: { 
                sampleRate: 44100,
                channelCount: 1,
                echoCancellation: false,
                noiseSuppression: false,
                autoGainControl: false
            } 
        });
        
        if (audioCtx.state === 'suspended') await audioCtx.resume();
        
        const micSource = audioCtx.createMediaStreamSource(stream);
        recorderNode = audioCtx.createScriptProcessor(4096, 1, 1);
        recordedChunks = [];
        
        recorderNode.onaudioprocess = (e) => {
            if (!isRecording) return;
            recordedChunks.push(new Float32Array(e.inputBuffer.getChannelData(0)));
        };
        
        const voiceGain = audioCtx.createGain();
        voiceGain.gain.value = voiceVolSlider.value / 100;
        
        backingSource = audioCtx.createBufferSource();
        backingSource.buffer = backingBuffer;
        const backingGain = audioCtx.createGain();
        backingGain.gain.value = 1.0;
        
        micSource.connect(recorderNode);
        recorderNode.connect(voiceGain);
        voiceGain.connect(audioCtx.destination);
        
        backingSource.connect(backingGain);
        backingGain.connect(audioCtx.destination);
        
        backingSource.start(audioCtx.currentTime + 0.05);
        
        isRecording = true;
        startTime = performance.now();
        btn.className = 'btn recording';
        btn.innerHTML = '停止<br>录制';
        statusEl.textContent = '录制中 · 伴奏播放中';
        updateTimer();
        timerInterval = setInterval(updateTimer, 200);
        
        backingSource.onended = () => {
            if (isRecording) {
                setTimeout(() => { if (isRecording) stopRecording(); }, 500);
            }
        };
        
    } catch (err) {
        console.error(err);
        if (err.name === 'NotAllowedError') {
            statusEl.textContent = '请在浏览器设置中允许麦克风权限';
        } else if (err.name === 'NotReadableError') {
            statusEl.textContent = '麦克风被占用，请关闭其他应用';
        } else {
            statusEl.textContent = '错误: ' + err.message;
        }
    }
}

async function stopRecording() {
    if (!isRecording) return;
    isRecording = false;
    clearInterval(timerInterval);
    
    btn.className = 'btn';
    btn.innerHTML = '合成<br>中...';
    btn.disabled = true;
    statusEl.textContent = '正在合成...';
    progressBar.style.width = '100%';
    
    if (backingSource) {
        try { backingSource.stop(); } catch(e) {}
        backingSource.disconnect();
        backingSource = null;
    }
    if (recorderNode) {
        recorderNode.disconnect();
        recorderNode = null;
    }
    
    await new Promise(r => setTimeout(r, 300));
    const elapsed = (performance.now() - startTime) / 1000;
    timerEl.textContent = formatTime(elapsed);
    
    await doMix();
}

async function doMix() {
    statusEl.textContent = '三轨混音中...';
    
    try {
        const sampleRate = audioCtx.sampleRate;
        const totalSamples = recordedChunks.reduce((sum, c) => sum + c.length, 0);
        
        if (totalSamples === 0) {
            statusEl.textContent = '未录制到音频，请重试';
            btn.innerHTML = '开始<br>录制';
            btn.disabled = false;
            return;
        }
        
        const voiceData = new Float32Array(totalSamples);
        let offset = 0;
        for (const chunk of recordedChunks) {
            voiceData.set(chunk, offset);
            offset += chunk.length;
        }
        
        const voiceDuration = totalSamples / sampleRate;
        const backingDuration = backingBuffer.duration;
        const mixDuration = Math.max(voiceDuration, backingDuration);
        const mixSamples = Math.ceil(mixDuration * sampleRate);
        
        const offlineCtx = new OfflineAudioContext(2, mixSamples, sampleRate);
        
        const voiceBuf = offlineCtx.createBuffer(1, totalSamples, sampleRate);
        voiceBuf.getChannelData(0).set(voiceData);
        const voiceSrc = offlineCtx.createBufferSource();
        voiceSrc.buffer = voiceBuf;
        const voiceGain = offlineCtx.createGain();
        voiceGain.gain.value = voiceVolSlider.value / 100;
        voiceSrc.connect(voiceGain);
        voiceGain.connect(offlineCtx.destination);
        
        const backingSrc = offlineCtx.createBufferSource();
        backingSrc.buffer = backingBuffer;
        const backingGain = offlineCtx.createGain();
        backingGain.gain.value = 0.7;
        backingSrc.connect(backingGain);
        backingGain.connect(offlineCtx.destination);
        
        voiceSrc.start(0);
        backingSrc.start(0);
        
        infoEl.textContent = '人声 ' + formatTime(voiceDuration) + ' · 伴奏 ' + formatTime(backingDuration);
        
        const rendered = await offlineCtx.startRendering();
        const wavBlob = renderBufferToWav(rendered);
        
        // 移动端使用不同下载策略
        if (/iPhone|iPad|iPod/.test(navigator.userAgent)) {
            // iOS: 弹出新窗口预览，用户可以长按保存
            const url = URL.createObjectURL(wavBlob);
            window.open(url, '_blank');
            statusEl.textContent = '完成! 新窗口已打开，长按保存音频';
        } else {
            downloadBlob(wavBlob, 'final_duet.wav');
            statusEl.textContent = '完成! 下载 final_duet.wav';
        }
        statusEl.style.color = '#4ecdc4';
        infoEl.textContent = '成品时长 ' + formatTime(mixDuration);
        
        btn.innerHTML = '开始<br>录制';
        btn.disabled = false;
        btn.className = 'btn done';
        
    } catch(e) {
        console.error('mix error:', e);
        statusEl.textContent = '合成失败: ' + e.message;
        btn.innerHTML = '开始<br>录制';
        btn.disabled = false;
    }
}

function renderBufferToWav(buffer) {
    const numChannels = buffer.numberOfChannels;
    const sampleRate = buffer.sampleRate;
    const bitsPerSample = 16;
    const data = [];
    for (let ch = 0; ch < numChannels; ch++) data.push(buffer.getChannelData(ch));
    
    const samplesPerChannel = data[0].length;
    const byteRate = sampleRate * numChannels * bitsPerSample / 8;
    const blockAlign = numChannels * bitsPerSample / 8;
    const dataSize = samplesPerChannel * numChannels * bitsPerSample / 8;
    const headerSize = 44;
    const bufferSize = headerSize + dataSize;
    
    const arrayBuf = new ArrayBuffer(bufferSize);
    const view = new DataView(arrayBuf);
    const ws = (off, str) => { for(let i=0;i<str.length;i++) view.setUint8(off+i, str.charCodeAt(i)); };
    
    ws(0, 'RIFF');
    view.setUint32(4, bufferSize - 8, true);
    ws(8, 'WAVE');
    ws(12, 'fmt ');
    view.setUint32(16, 16, true);
    view.setUint16(20, 1, true);
    view.setUint16(22, numChannels, true);
    view.setUint32(24, sampleRate, true);
    view.setUint32(28, byteRate, true);
    view.setUint16(32, blockAlign, true);
    view.setUint16(34, bitsPerSample, true);
    ws(36, 'data');
    view.setUint32(40, dataSize, true);
    
    let off = 44;
    for (let s = 0; s < samplesPerChannel; s++) {
        for (let ch = 0; ch < numChannels; ch++) {
            const sample = Math.max(-1, Math.min(1, data[ch][s]));
            const int16 = sample < 0 ? sample * 0x8000 : sample * 0x7FFF;
            view.setInt16(off, int16, true);
            off += 2;
        }
    }
    return new Blob([arrayBuf], { type: 'audio/wav' });
}

function downloadBlob(blob, filename) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function updateTimer() {
    const elapsed = (performance.now() - startTime) / 1000;
    timerEl.textContent = formatTime(elapsed);
    progressBar.style.width = Math.min(100, (elapsed / 300) * 100) + '%';
}

function formatTime(sec) {
    if (!isFinite(sec)) return '--:--';
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60);
    return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}
</script>
</body>
</html>
