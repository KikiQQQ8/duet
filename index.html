<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>隔空对唱 - 一键录制混音</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { 
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    color: #fff; min-height: 100vh; display: flex;
    align-items: center; justify-content: center;
}
.container { text-align: center; padding: 40px; max-width: 500px; width: 100%; }
h1 { font-size: 28px; margin-bottom: 10px; letter-spacing: 4px; }
.sub { color: #aaa; margin-bottom: 30px; font-size: 14px; }

.btn {
    width: 140px; height: 140px; border-radius: 50%;
    border: 4px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.05);
    color: #fff; font-size: 18px; cursor: pointer; transition: all 0.3s;
    display: inline-flex; align-items: center; justify-content: center;
    position: relative; outline: none; -webkit-tap-highlight-color: transparent;
    margin: 0 auto;
}
.btn:hover { border-color: #ff6b6b; box-shadow: 0 0 30px rgba(255,107,107,0.3); }
.btn.recording { 
    border-color: #ff6b6b; background: rgba(255,107,107,0.15);
    animation: pulse 1.5s ease-in-out infinite;
    box-shadow: 0 0 40px rgba(255,107,107,0.5);
}
@keyframes pulse {
    0%,100% { transform: scale(1); box-shadow: 0 0 30px rgba(255,107,107,0.3); }
    50% { transform: scale(1.08); box-shadow: 0 0 60px rgba(255,107,107,0.6); }
}
.btn.done { border-color: #4ecdc4; animation: none; }
.btn.loading { border-color: #ffd700; }

.status { margin-top: 30px; font-size: 16px; color: #aaa; min-height: 24px; }
.timer { font-size: 36px; font-weight: 300; margin-top: 10px; font-variant-numeric: tabular-nums; }
.info { color: #666; font-size: 12px; margin-top: 5px; min-height: 18px; }
.progress { margin-top: 20px; height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
.progress-bar { height: 100%; background: #ff6b6b; width: 0%; transition: width 0.3s; }

.volume-row { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 20px; }
.volume-row label { font-size: 13px; color: #888; min-width: 50px; text-align: right; }
.volume-row input[type=range] { width: 120px; accent-color: #ff6b6b; }
.volume-row span { font-size: 12px; color: #666; min-width: 30px; }

.note { color: #555; font-size: 12px; margin-top: 30px; line-height: 1.8; }
</style>
</head>
<body>
<div class="container">
    <h1>隔空对唱</h1>
    <p class="sub">录制 + 混音 · 一键完成</p>
    
    <button class="btn loading" id="recordBtn" onclick="toggleRecord()" disabled>加载<br>伴奏</button>
    
    <div class="timer" id="timer">00:00</div>
    <div class="info" id="info"></div>
    <div class="status" id="status">正在加载伴奏...</div>
    <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
    
    <div class="volume-row">
        <label>人声音量</label>
        <input type="range" id="voiceVol" min="50" max="200" value="100" oninput="updateVolLabel()">
        <span id="voiceVolLabel">100%</span>
    </div>
    
    <p class="note">
        点击按钮 → 伴奏响起 → 开始唱<br>
        唱完自动停止 → 几秒合成 → 下载成品<br>
        建议佩戴耳机以获得干净的录音
    </p>
</div>

<audio id="previewAudio" style="display:none"></audio>

<script>
const btn = document.getElementById('recordBtn');
const timerEl = document.getElementById('timer');
const statusEl = document.getElementById('status');
const infoEl = document.getElementById('info');
const progressBar = document.getElementById('progressBar');
const voiceVolSlider = document.getElementById('voiceVol');
const voiceVolLabel = document.getElementById('voiceVolLabel');
const previewAudio = document.getElementById('previewAudio');

let audioCtx = null;
let backingBuffer = null;
let isRecording = false;
let startTime = 0;
let timerInterval = null;
let recorderNode = null;
let backingSource = null;
let recordedChunks = [];
let backingStartTime = 0; // AudioContext.currentTime when backing started

function updateVolLabel() {
    voiceVolLabel.textContent = voiceVolSlider.value + '%';
}

// ---- 加载伴奏 ----
async function loadBacking() {
    // 尝试加载预混伴奏
    const files = ['backing_mix.wav', 'backing.wav', 'backing.mp3', 'backing_mix.mp3'];
    let arrayBuf = null;
    
    for (const f of files) {
        try {
            const resp = await fetch(f);
            if (resp.ok) {
                arrayBuf = await resp.arrayBuffer();
                infoEl.textContent = '伴奏: ' + f;
                break;
            }
        } catch(e) { continue; }
    }
    
    if (!arrayBuf) {
        statusEl.textContent = '未找到伴奏文件';
        return;
    }
    
    audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 44100 });
    backingBuffer = await audioCtx.decodeAudioData(arrayBuf);
    
    btn.disabled = false;
    btn.className = 'btn';
    btn.innerHTML = '开始<br>录制';
    statusEl.textContent = '点击按钮开始';
    infoEl.textContent = '伴奏就绪 · ' + formatTime(backingBuffer.duration);
}

loadBacking();

// ---- 录制 ----
async function toggleRecord() {
    if (isRecording) {
        stopRecording();
        return;
    }
    
    if (!backingBuffer || !audioCtx) return;
    
    try {
        statusEl.textContent = '获取麦克风权限...';
        
        const stream = await navigator.mediaDevices.getUserMedia({ 
            audio: { 
                sampleRate: 44100,
                channelCount: 1,
                echoCancellation: false,
                noiseSuppression: false,
                autoGainControl: false
            } 
        });
        
        // 如果 AudioContext 被暂停（浏览器策略），恢复它
        if (audioCtx.state === 'suspended') await audioCtx.resume();
        
        // 创建麦克风源
        const micSource = audioCtx.createMediaStreamSource(stream);
        
        // 用于录制的 ScriptProcessorNode（采集原始麦克风数据）
        recorderNode = audioCtx.createScriptProcessor(4096, 1, 1);
        recordedChunks = [];
        
        recorderNode.onaudioprocess = (e) => {
            if (!isRecording) return;
            const input = e.inputBuffer.getChannelData(0);
            recordedChunks.push(new Float32Array(input));
        };
        
        // 用于监听输出的节点（让用户能听到自己的声音）
        const voiceGain = audioCtx.createGain();
        voiceGain.gain.value = voiceVolSlider.value / 100;
        
        // 伴奏节点
        backingSource = audioCtx.createBufferSource();
        backingSource.buffer = backingBuffer;
        
        const backingGain = audioCtx.createGain();
        backingGain.gain.value = 1.0;
        
        // 连接图：
        // 麦克风 → recorderNode → voiceGain → destination（监听）
        //                     → 不连输出（只录制原始信号）
        // 伴奏 → backingGain → destination（播放给用户听）
        micSource.connect(recorderNode);
        recorderNode.connect(voiceGain);
        voiceGain.connect(audioCtx.destination);
        
        backingSource.connect(backingGain);
        backingGain.connect(audioCtx.destination);
        
        // 启动伴奏（精确记录时间戳）
        backingStartTime = audioCtx.currentTime + 0.05; // 50ms 微小延迟确保同步
        backingSource.start(backingStartTime);
        
        isRecording = true;
        startTime = performance.now();
        btn.className = 'btn recording';
        btn.innerHTML = '停止<br>录制';
        statusEl.textContent = '录制中 · 伴奏播放中';
        updateTimer();
        timerInterval = setInterval(updateTimer, 200);
        
        // 伴奏结束时自动停止
        backingSource.onended = () => {
            if (isRecording) {
                const actualEnd = backingStartTime + backingBuffer.duration;
                // 等待到精确的结束时间
                const remainingMs = (actualEnd - audioCtx.currentTime) * 1000;
                setTimeout(() => {
                    if (isRecording) stopRecording();
                }, Math.max(0, remainingMs));
            }
        };
        
    } catch (err) {
        console.error(err);
        if (err.name === 'NotAllowedError') {
            statusEl.textContent = '麦克风权限被拒绝';
        } else if (err.name === 'NotReadableError') {
            statusEl.textContent = '无法访问麦克风，检查是否有其他应用占用';
        } else {
            statusEl.textContent = '错误: ' + err.message;
        }
    }
}

async function stopRecording() {
    if (!isRecording) return;
    isRecording = false;
    clearInterval(timerInterval);
    
    btn.className = 'btn';
    btn.innerHTML = '合成<br>中...';
    btn.disabled = true;
    statusEl.textContent = '停止录制，正在合成...';
    progressBar.style.width = '100%';
    
    // 停止伴奏
    if (backingSource) {
        try { backingSource.stop(); } catch(e) {}
        backingSource.disconnect();
        backingSource = null;
    }
    
    // 停止录制节点
    if (recorderNode) {
        recorderNode.disconnect();
        recorderNode = null;
    }
    
    // 短暂等待确保最后的数据被收集
    await new Promise(r => setTimeout(r, 200));
    
    const elapsed = (performance.now() - startTime) / 1000;
    timerEl.textContent = formatTime(elapsed);
    
    await doMix();
}

async function doMix() {
    statusEl.textContent = '正在三轨混音...';
    
    try {
        // 计算观众录音总时长（精确到最后一个采样）
        const sampleRate = audioCtx.sampleRate;
        const totalSamples = recordedChunks.reduce((sum, c) => sum + c.length, 0);
        
        if (totalSamples === 0) {
            statusEl.textContent = '没有录制到音频，请重试';
            btn.innerHTML = '开始<br>录制';
            btn.disabled = false;
            return;
        }
        
        // 把录制数据拼成完整 Float32Array
        const voiceData = new Float32Array(totalSamples);
        let offset = 0;
        for (const chunk of recordedChunks) {
            voiceData.set(chunk, offset);
            offset += chunk.length;
        }
        
        const voiceDuration = totalSamples / sampleRate;
        const backingDuration = backingBuffer.duration;
        const mixDuration = Math.max(voiceDuration, backingDuration);
        const mixSamples = Math.ceil(mixDuration * sampleRate);
        
        // OfflineAudioContext 三轨混音
        const offlineCtx = new OfflineAudioContext(2, mixSamples, sampleRate);
        
        // 人声轨 (时间 0 开始)
        const voiceBuf = offlineCtx.createBuffer(1, totalSamples, sampleRate);
        voiceBuf.getChannelData(0).set(voiceData);
        const voiceSrc = offlineCtx.createBufferSource();
        voiceSrc.buffer = voiceBuf;
        const voiceGain = offlineCtx.createGain();
        voiceGain.gain.value = voiceVolSlider.value / 100;
        voiceSrc.connect(voiceGain);
        voiceGain.connect(offlineCtx.destination);
        
        // 伴奏轨 (backing_mix 包含领唱+伴奏，所以直接是一个完整轨)
        const backingSrc = offlineCtx.createBufferSource();
        backingSrc.buffer = backingBuffer;
        const backingGain = offlineCtx.createGain();
        backingGain.gain.value = 0.7; // 稍微降低伴奏音量，凸显人声
        backingSrc.connect(backingGain);
        backingGain.connect(offlineCtx.destination);
        
        // 同时启动
        voiceSrc.start(0);
        backingSrc.start(0);
        
        infoEl.textContent = '渲染中 · 人声 ' + formatTime(voiceDuration) + ' · 伴奏 ' + formatTime(backingDuration);
        
        const rendered = await offlineCtx.startRendering();
        
        // 导出 WAV
        const wavBlob = renderBufferToWav(rendered);
        downloadBlob(wavBlob, 'final_duet.wav');
        
        // 预览
        const previewUrl = URL.createObjectURL(wavBlob);
        previewAudio.src = previewUrl;
        
        statusEl.textContent = '完成! 下载 final_duet.wav 中...';
        statusEl.style.color = '#4ecdc4';
        infoEl.textContent = '成品时长 ' + formatTime(mixDuration) + ' · 三轨混音';
        
        btn.innerHTML = '开始<br>录制';
        btn.disabled = false;
        btn.className = 'btn done';
        
    } catch(e) {
        console.error('混音失败:', e);
        statusEl.textContent = '混音失败: ' + e.message;
        btn.innerHTML = '开始<br>录制';
        btn.disabled = false;
    }
}

function renderBufferToWav(buffer) {
    const numChannels = buffer.numberOfChannels;
    const sampleRate = buffer.sampleRate;
    const bitsPerSample = 16;
    const data = [];
    
    for (let ch = 0; ch < numChannels; ch++) {
        data.push(buffer.getChannelData(ch));
    }
    
    const samplesPerChannel = data[0].length;
    const byteRate = sampleRate * numChannels * bitsPerSample / 8;
    const blockAlign = numChannels * bitsPerSample / 8;
    const dataSize = samplesPerChannel * numChannels * bitsPerSample / 8;
    const headerSize = 44;
    const bufferSize = headerSize + dataSize;
    
    const arrayBuf = new ArrayBuffer(bufferSize);
    const view = new DataView(arrayBuf);
    
    const ws = (off, str) => { for(let i=0;i<str.length;i++) view.setUint8(off+i, str.charCodeAt(i)); };
    
    ws(0, 'RIFF');
    view.setUint32(4, bufferSize - 8, true);
    ws(8, 'WAVE');
    ws(12, 'fmt ');
    view.setUint32(16, 16, true);
    view.setUint16(20, 1, true);
    view.setUint16(22, numChannels, true);
    view.setUint32(24, sampleRate, true);
    view.setUint32(28, byteRate, true);
    view.setUint16(32, blockAlign, true);
    view.setUint16(34, bitsPerSample, true);
    ws(36, 'data');
    view.setUint32(40, dataSize, true);
    
    let off = 44;
    for (let s = 0; s < samplesPerChannel; s++) {
        for (let ch = 0; ch < numChannels; ch++) {
            const sample = Math.max(-1, Math.min(1, data[ch][s]));
            const int16 = sample < 0 ? sample * 0x8000 : sample * 0x7FFF;
            view.setInt16(off, int16, true);
            off += 2;
        }
    }
    
    return new Blob([arrayBuf], { type: 'audio/wav' });
}

function downloadBlob(blob, filename) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function updateTimer() {
    const elapsed = (performance.now() - startTime) / 1000;
    timerEl.textContent = formatTime(elapsed);
    progressBar.style.width = Math.min(100, (elapsed / 300) * 100) + '%';
    
    if (audioCtx && backingBuffer && backingStartTime) {
        const backingElapsed = audioCtx.currentTime - backingStartTime;
        const remain = backingBuffer.duration - backingElapsed;
        if (remain > 0) {
            infoEl.textContent = '伴奏剩余 ' + formatTime(remain);
        }
    }
}

function formatTime(sec) {
    if (!isFinite(sec)) return '--:--';
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60);
    return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}
</script>
</body>
</html>
